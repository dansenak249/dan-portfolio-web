<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>VGen Trending - Data Viewer</title>
<style>
  :root {
    --bg: oklch(16% 0.02 270);
    --surface: oklch(21% 0.025 270);
    --surface-2: oklch(26% 0.03 270);
    --text: oklch(94% 0.01 270);
    --muted: oklch(68% 0.02 270);
    --accent: oklch(72% 0.18 200);
    --accent-2: oklch(74% 0.19 330);
    --good: oklch(74% 0.17 150);
    --warn: oklch(80% 0.16 80);
    --bad: oklch(63% 0.21 25);
    --line: oklch(32% 0.02 270);
    --radius: 12px;
    --brand: #ff69b4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    background: linear-gradient(180deg, var(--surface), transparent);
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: -0.01em; }
  header .meta { color: var(--muted); font-size: 12px; }
  header button {
    margin-left: auto; background: var(--accent); color: oklch(14% 0.02 270);
    border: 0; padding: 8px 16px; border-radius: 8px; font-weight: 600;
    cursor: pointer;
  }
  header button:hover { filter: brightness(1.08); }
  header button + button { margin-left: 8px; }
  header #export { background: var(--surface-2); color: var(--text); border: 1px solid var(--line); }
  nav { display: flex; gap: 4px; padding: 0 28px; border-bottom: 1px solid var(--line); }
  nav a {
    padding: 12px 16px; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; user-select: none; font-weight: 500;
  }
  nav a.active { color: var(--text); border-bottom-color: var(--accent); }
  main { padding: 24px 28px; max-width: 1200px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .card .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .v { font-size: 26px; font-weight: 700; margin-top: 4px; letter-spacing: -0.02em; }
  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
  .panel h2 { font-size: 14px; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  select {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font: inherit; margin-right: 10px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--surface); cursor: pointer; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .title-cell { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scroll { max-height: 520px; overflow: auto; border-radius: 8px; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.up { background: oklch(74% 0.17 150 / 0.18); color: var(--good); }
  .pill.down { background: oklch(70% 0.18 25 / 0.18); color: oklch(75% 0.18 25); }
  .pill.flat { background: var(--surface-2); color: var(--muted); }
  .pill.near { background: oklch(80% 0.16 80 / 0.18); color: var(--warn); }
  .legend { display: flex; gap: 18px; margin: 6px 0 12px; font-size: 12px; color: var(--muted); }
  .legend span::before { content: ""; display: inline-block; width: 12px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .legend .views::before { background: var(--accent); }
  .legend .si::before { background: var(--accent-2); }
  .legend .floor::before { background: var(--warn); }
  .legend .thr::before { background: var(--warn); height: 0; border-top: 2px dashed var(--warn); }
  svg { width: 100%; height: auto; display: block; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
  text { fill: var(--muted); font-size: 11px; }
  #chart { position: relative; }
  #chart svg * { pointer-events: none; }
  #chart svg #hoverArea { pointer-events: all; }
  .ctrl-row { display: flex; align-items: center; gap: 0; }
  .tgl {
    margin-left: auto; height: 34px; padding: 0 14px; flex: 0 0 auto;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font: inherit; font-weight: 600;
  }
  .tgl:hover { filter: brightness(1.12); }
  .tgl.on { border-color: var(--accent); color: var(--accent); background: oklch(72% 0.18 200 / 0.12); }
  .sq {
    margin-left: 8px; width: 34px; height: 34px; flex: 0 0 auto;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font-size: 16px; line-height: 1;
  }
  .sq:hover { filter: brightness(1.12); }
  .sq.on { border-color: var(--accent); color: var(--accent); }
  .cfg { margin-top: 12px; padding: 14px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; }
  .cfg .field { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cfg .field label { min-width: 190px; color: var(--muted); }
  .cfg input[type="number"] {
    background: var(--surface); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; font: inherit; width: 140px;
  }
  /* Discrete node slider for the trending top-N threshold. Nodes are evenly
     spaced (a readable approximation), not linear in rank value. */
  .thr-slider { flex: 1; min-width: 260px; }
  .thr-slider input[type="range"] {
    width: 100%; margin: 0; accent-color: var(--accent); cursor: pointer;
  }
  .thr-ticks { display: flex; justify-content: space-between; margin-top: 4px; }
  .thr-ticks span { font-size: 11px; color: var(--muted); }
  .thr-ticks span.on { color: var(--accent); font-weight: 700; }
  /* Full-viewport loading overlay (mirrors the site's LoadingScreen brand). */
  #loadingOverlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; background: var(--bg); transition: opacity 0.25s ease;
  }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  #loadingOverlay img { width: 140px; height: auto; }
  .lo-text {
    color: var(--brand); font-weight: 700; font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.18em;
    display: flex; align-items: baseline;
  }
  .lo-text .dots { display: inline-block; width: 22px; text-align: left; margin-left: 4px; }
  /* Health status dot in the header + inline dots in the log table. */
  .status-dot {
    width: 11px; height: 11px; border-radius: 50%; display: inline-block;
    cursor: pointer; flex: 0 0 auto; align-self: center;
    box-shadow: 0 0 0 3px transparent; transition: box-shadow 0.2s;
  }
  .status-dot:hover { box-shadow: 0 0 0 3px var(--surface-2); }
  .status-dot.ok { background: var(--good); }
  .status-dot.warn { background: var(--warn); }
  .status-dot.err { background: var(--bad); }
  .status-dot.warn, .status-dot.err { animation: dotPulse 1.6s ease-in-out infinite; }
  @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .dot-inline {
    width: 9px; height: 9px; border-radius: 50%; display: inline-block;
    margin-right: 6px; vertical-align: middle;
  }
  .dot-inline.ok { background: var(--good); }
  .dot-inline.warn { background: var(--warn); }
  .dot-inline.err { background: var(--bad); }
  /* Collapsible status log. */
  details.logbox > summary {
    cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em; list-style: none;
    display: flex; align-items: center; gap: 8px;
  }
  details.logbox > summary::-webkit-details-marker { display: none; }
  details.logbox > summary::before {
    content: "\25B8"; display: inline-block; transition: transform 0.15s; color: var(--muted);
  }
  details.logbox[open] > summary::before { transform: rotate(90deg); }
  /* ---- Watchlist manager ---- */
  .wl-add { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .wl-add input {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font: inherit;
  }
  .wl-add input#wlName { flex: 1 1 220px; min-width: 180px; }
  .wl-add input#wlUid { flex: 1 1 300px; min-width: 220px; font-variant-numeric: tabular-nums; }
  .wl-add button {
    background: var(--accent); color: oklch(14% 0.02 270); border: 0;
    border-radius: 8px; padding: 0 16px; font-weight: 700; cursor: pointer; flex: 0 0 auto;
  }
  .wl-add button:hover { filter: brightness(1.08); }
  table.wl td, table.wl th { vertical-align: middle; }
  table.wl tr.dragging { opacity: 0.4; }
  table.wl tr.drop-above td { box-shadow: inset 0 2px 0 var(--accent); }
  table.wl tr.drop-below td { box-shadow: inset 0 -2px 0 var(--accent); }
  .wl-handle {
    cursor: grab; color: var(--muted); user-select: none; font-size: 15px;
    width: 22px; text-align: center; line-height: 1;
  }
  .wl-handle:active { cursor: grabbing; }
  .wl-uid { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
  .wl-dot {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; width: 30px; height: 28px; cursor: pointer; font-size: 16px; line-height: 1;
  }
  .wl-dot:hover { filter: brightness(1.12); }
  .wl-menu {
    position: absolute; z-index: 50; min-width: 168px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 6px; box-shadow: 0 10px 30px oklch(0% 0 0 / 0.45);
  }
  .wl-menu button {
    display: block; width: 100%; text-align: left; background: transparent;
    color: var(--text); border: 0; padding: 9px 12px; border-radius: 7px;
    cursor: pointer; font: inherit;
  }
  .wl-menu button:hover { background: var(--surface); }
  .wl-menu button.danger { color: var(--bad); }
</style>
</head>
<body>
<div id="loadingOverlay">
  <img src="/general/loading.gif" alt="Loading" />
  <div class="lo-text">Loading<span class="dots" id="loadDots">.</span></div>
</div>
<header>
  <h1>VGen Trending - Data Viewer</h1>
  <span class="status-dot warn" id="statusDot" title="Initializing"></span>
  <span class="meta" id="meta">loading...</span>
  <button id="export">Export</button>
  <button id="refresh">Refresh</button>
</header>
<nav>
  <a data-tab="overview" class="active">Overview</a>
  <a data-tab="profiles">Profiles (tracking)</a>
  <a data-tab="trending">Trending</a>
  <a data-tab="cross">Cross-reference</a>
</nav>
<main id="main"><div class="empty">Loading data...</div></main>

<script>
// DATA.trending holds only the LATEST trending snapshot's rows; older snapshots
// load on demand (see wireTrending). DATA.profiles holds only the last 2 profile
// snapshots (enough for the delta table); a post's full history loads on demand
// (see fetchPostSeries). trendingSnapshots / profileSnapshots list every kept ts
// for the pickers. SNAP_CACHE / POST_CACHE memoize on-demand fetches.
let DATA = { trending: [], profiles: [], threshold: [], trendingSnapshots: [], profileSnapshots: [], watchlist: [] };
const SNAP_CACHE = new Map();
const POST_CACHE = new Map();
// The /churn payload ({ churn, uniquePosts, snapshots }) is the whole-window
// trending analysis: it powers BOTH the Overview "Unique trending posts" card
// and the Trending tab's churn table. /data can't carry these (it ships only the
// latest snapshot), so we fetch /churn once and memoize it here, shared across
// tabs and reset in applyData, so the heavy server-side read runs at most once
// per data change no matter how many tabs use it.
let CHURN_CACHE = null;   // resolved /churn JSON for the current data version
let CHURN_PROMISE = null; // in-flight fetch, so concurrent callers share one request
async function fetchChurn() {
  if (CHURN_CACHE) return CHURN_CACHE;
  if (!CHURN_PROMISE) {
    CHURN_PROMISE = (async () => {
      const res = await fetch("/api/vgen-trending/churn", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })();
  }
  try {
    CHURN_CACHE = await CHURN_PROMISE;
    return CHURN_CACHE;
  } finally {
    CHURN_PROMISE = null;
  }
}
// localStorage cache of the last /data payload. On load we first ask /status for
// the newest snapshot ts per kind; if it matches this cache we render from here
// and skip the heavy /data download (avoids a wasteful refresh when nothing
// changed). Bump CACHE_VERSION whenever the payload shape changes.
const CACHE_KEY = "vg_data_cache";
// v2: payload now also carries the editable watchlist (userID + label).
const CACHE_VERSION = 2;
// Persist UI state in localStorage so Refresh AND F5 both keep your view.
let TAB = localStorage.getItem("vg_tab") || "overview";
let SEL_USER = localStorage.getItem("vg_user") || null;
let SEL_POST = localStorage.getItem("vg_post") || null;
let CHART = { pts: [], W: 0, padT: 0 }; // geometry for the hover handler
// Chart axis / threshold config (persisted). justify=true => auto-fit to data
// (current behaviour) and the likes-max field is ignored.
// thr is a TRENDING RANK COUNT (top N): the chart converts it to the searchIndex
// of the post sitting at rank N in the latest snapshot.
const CFG_VERSION = 4;
// The trending threshold is no longer a free-form rank; it snaps to the cut
// points the collector actually stores (vgen:threshold:series .cuts keys), so
// the dashboard can plot a real per-cut SI line over time. Trending is collected
// to top 200, so the cuts stop at 200 (older 300/500/1000 nodes were dropped).
const THR_NODES = [10, 20, 50, 100, 200];
const CFG_DEFAULT = { v: CFG_VERSION, maxLikes: 100, thr: 100, justify: true };
// Snap any number to the nearest stored cut node.
function snapNode(n) {
  let best = THR_NODES[0];
  for (const v of THR_NODES) if (Math.abs(v - n) < Math.abs(best - n)) best = v;
  return best;
}
let CFG = (() => {
  try {
    const s = { ...CFG_DEFAULT, ...JSON.parse(localStorage.getItem("vg_cfg") || "{}") };
    // bump resets thr from any earlier (free-form rank) value to a stored cut node
    if (s.v !== CFG_VERSION) { s.thr = CFG_DEFAULT.thr; s.v = CFG_VERSION; }
    s.thr = snapNode(Number(s.thr) || CFG_DEFAULT.thr);
    return s;
  } catch { return { ...CFG_DEFAULT }; }
})();
const saveCfg = () => localStorage.setItem("vg_cfg", JSON.stringify(CFG));
const saveSel = () => {
  SEL_USER ? localStorage.setItem("vg_user", SEL_USER) : localStorage.removeItem("vg_user");
  SEL_POST ? localStorage.setItem("vg_post", SEL_POST) : localStorage.removeItem("vg_post");
};
const syncNav = () => document.querySelectorAll("nav a")
  .forEach(x => x.classList.toggle("active", x.dataset.tab === TAB));

// ---- Health monitoring + status log --------------------------------------
// The collector runs hourly. We judge health by how old the newest stored
// snapshot is: if no fresh snapshot arrives, the collection pipeline (GitHub
// Actions -> /collect -> Redis) has likely stalled, timed out, or been blocked.
const COLLECT_INTERVAL_MIN = 60;
const STALE_WARN_MIN = 90;   // a run or two may have slipped -> yellow
const STALE_ERR_MIN = 180;   // pipeline almost certainly stopped -> red
const HEALTH_POLL_MS = 60000; // re-evaluate age once a minute (no refetch)
const FETCH_TIMEOUT_MS = 30000;
const LOG_MAX = 60;
let LAST_LEVEL = null;
let dotTimer = null;

const getLog = () => { try { return JSON.parse(localStorage.getItem("vg_log") || "[]"); } catch { return []; } };
function pushLog(level, msg) {
  const log = getLog();
  log.unshift({ t: new Date().toISOString(), level, msg });
  if (log.length > LOG_MAX) log.length = LOG_MAX;
  localStorage.setItem("vg_log", JSON.stringify(log));
}
const lvlText = (l) => l === "ok" ? "OK" : l === "warn" ? "Warning" : "Error";
function humanAge(min) {
  if (min < 60) return min + "m";
  const h = Math.floor(min / 60), m = min % 60;
  if (h < 24) return h + "h" + (m ? " " + m + "m" : "");
  const d = Math.floor(h / 24);
  return d + "d " + (h % 24) + "h";
}
function setStatus(level, title) {
  const d = document.getElementById("statusDot");
  if (!d) return;
  d.className = "status-dot " + level;
  d.title = title;
}
function latestSnapshotAgeMin() {
  let newest = null;
  for (const r of DATA.trending) if (r.snapshot_ts && (!newest || r.snapshot_ts > newest)) newest = r.snapshot_ts;
  for (const r of DATA.profiles) if (r.snapshot_ts && (!newest || r.snapshot_ts > newest)) newest = r.snapshot_ts;
  if (!newest) return null;
  return Math.round((Date.now() - new Date(newest).getTime()) / 60000);
}
// Map snapshot age -> traffic-light status. Logs on every fetch, and on idle
// polls only when the level changes (so an open tab quietly turns yellow/red
// if the collector dies, without spamming the log).
function evaluateHealth(fromFetch) {
  const ageMin = latestSnapshotAgeMin();
  let level, note;
  if (ageMin === null) {
    level = "warn"; note = "No snapshots yet \u2013 waiting for the first collector run";
  } else if (ageMin <= STALE_WARN_MIN) {
    level = "ok"; note = "Healthy \u2013 last snapshot " + humanAge(ageMin) + " ago";
  } else if (ageMin <= STALE_ERR_MIN) {
    level = "warn"; note = "Collector delayed \u2013 last snapshot " + humanAge(ageMin) + " ago";
  } else {
    level = "err"; note = "Collector likely stopped \u2013 last snapshot " + humanAge(ageMin) + " ago";
  }
  setStatus(level, note);
  const changed = level !== LAST_LEVEL;
  if (fromFetch || changed) {
    pushLog(level, note + (fromFetch
      ? " (" + DATA.trending.length + " trending / " + DATA.profiles.length + " profile rows)"
      : ""));
    if (!fromFetch && changed && TAB === "overview") render();
  }
  LAST_LEVEL = level;
}

// ---- loading overlay -----------------------------------------------------
function showOverlay() {
  const o = document.getElementById("loadingOverlay");
  if (!o) return;
  o.classList.remove("hidden");
  const dots = document.getElementById("loadDots");
  const seq = [".", "..", "..."];
  let i = 0;
  clearInterval(dotTimer);
  dotTimer = setInterval(() => { if (dots) dots.textContent = seq[i++ % 3]; }, 400);
}
function hideOverlay() {
  const o = document.getElementById("loadingOverlay");
  if (o) o.classList.add("hidden");
  clearInterval(dotTimer);
  dotTimer = null;
}

const fmt = (n) => (n === null || n === undefined || n === "") ? "-" : Number(n).toLocaleString();
const fmtSi = (n) => (n === null || n === undefined || n === "") ? "-" : Number(n).toFixed(4);
const byTs = (a, b) => a.snapshot_ts < b.snapshot_ts ? -1 : a.snapshot_ts > b.snapshot_ts ? 1 : 0;
const uniq = (arr) => [...new Set(arr)];
// Post creation date as DD-MM-YY, used to disambiguate same-titled re-uploads
// (each re-upload is a distinct showcaseID with its own created date).
function fmtDMY(s) {
  if (!s) return "??-??-??";
  const d = new Date(s);
  if (isNaN(d.getTime())) return "??-??-??";
  const p = (n) => String(n).padStart(2, "0");
  return p(d.getDate()) + "-" + p(d.getMonth() + 1) + "-" + String(d.getFullYear()).slice(-2);
}

// Latest trending snapshot: its searchIndex floor (lowest SI still on the list)
// and the set of showcaseIDs currently on trending. This is the REAL threshold,
// computed from data, not a hardcoded guess.
function latestTrending() {
  const snaps = uniq(DATA.trending.map(r => r.snapshot_ts)).sort();
  if (!snaps.length) return { floor: null, set: new Set(), ts: null, count: 0 };
  const ts = snaps.at(-1);
  const rows = DATA.trending.filter(r => r.snapshot_ts === ts);
  let floor = Infinity;
  for (const r of rows) if (typeof r.searchIndex === "number" && r.searchIndex < floor) floor = r.searchIndex;
  return { floor: isFinite(floor) ? floor : null, set: new Set(rows.map(r => r.showcaseID)), ts, count: rows.length };
}

// searchIndex sitting at each trending rank cutoff in the latest snapshot.
function thresholdTable() {
  const snaps = uniq(DATA.trending.map(r => r.snapshot_ts)).sort();
  if (!snaps.length) return "";
  const ts = snaps.at(-1);
  const rows = DATA.trending
    .filter(r => r.snapshot_ts === ts && typeof r.searchIndex === "number")
    .sort((a, b) => a.rank - b.rank);
  if (!rows.length) return "";
  const cuts = [10, 20, 50, 100, 200];
  const body = cuts.map(n => {
    const have = n <= rows.length;
    const r = rows[Math.min(n, rows.length) - 1];
    return '<tr><td class="num">' + n + '</td>' +
      '<td class="num">' + (r ? fmtSi(r.searchIndex) : "-") + '</td>' +
      '<td class="num">' + (r ? fmt(r.viewCount) : "-") + '</td>' +
      '<td>' + (have ? "" : '<span class="pill flat">only ' + rows.length + ' posts</span>') + '</td></tr>';
  }).join("");
  return '<table style="margin-top:12px"><thead><tr>' +
    '<th class="num">Top N</th><th class="num">searchIndex</th>' +
    '<th class="num">views</th><th></th></tr></thead><tbody>' + body + '</tbody></table>';
}

// Convert a trending rank cutoff (top N) to the searchIndex sitting at that rank
// in the latest snapshot. N is clamped to the available list size.
function rankToSi(n) {
  const snaps = uniq(DATA.trending.map(r => r.snapshot_ts)).sort();
  if (!snaps.length) return null;
  const ts = snaps.at(-1);
  const rows = DATA.trending
    .filter(r => r.snapshot_ts === ts && typeof r.searchIndex === "number")
    .sort((a, b) => a.rank - b.rank);
  if (!rows.length) return null;
  const idx = Math.min(Math.max(1, Math.round(n)), rows.length) - 1;
  return rows[idx].searchIndex;
}

// Read the cached /data payload, validating its version. Returns null on any
// problem so the caller falls back to a network fetch.
function readCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || obj.v !== CACHE_VERSION || !obj.data) return null;
    return obj.data;
  } catch { return null; }
}
// Persist the latest /data payload. Wrapped because localStorage can throw
// (QuotaExceeded / disabled) - a cache miss is harmless, so we just skip it.
function writeCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ v: CACHE_VERSION, data }));
  } catch { /* quota exceeded or disabled - run without the cache */ }
}
// Apply a /data payload to DATA + the in-memory caches, then render.
function applyData(data, sourceLabel) {
  DATA = data;
  if (!Array.isArray(DATA.trendingSnapshots)) DATA.trendingSnapshots = [];
  if (!Array.isArray(DATA.profileSnapshots)) DATA.profileSnapshots = [];
  if (!Array.isArray(DATA.watchlist)) DATA.watchlist = [];
  SNAP_CACHE.clear();
  POST_CACHE.clear();
  CHURN_CACHE = null; CHURN_PROMISE = null; // recompute churn/unique lazily for the new data

  // The latest trending snapshot is what /data ships; cache it so re-selecting
  // it in the picker is instant and needs no extra round-trip.
  const latestTs = DATA.trendingSnapshots.at(-1);
  if (latestTs) SNAP_CACHE.set(latestTs, DATA.trending);
  const tSnaps = DATA.trendingSnapshots.length;
  const pSnaps = DATA.profileSnapshots.length;
  const pInline = uniq(DATA.profiles.map(r => r.snapshot_ts)).length;
  document.getElementById("meta").textContent =
    DATA.trending.length + " trending rows (latest of " + tSnaps + " snaps)  |  " +
    DATA.profiles.length + " profile rows (" + pInline + " of " + pSnaps + " snaps inline)  |  " +
    sourceLabel + " " + new Date(DATA.generated).toLocaleTimeString();
  render();
  evaluateHealth(true);
}

async function load() {
  const meta = document.getElementById("meta");
  meta.textContent = "loading...";
  setStatus("warn", "Loading\u2026");
  showOverlay();
  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
  try {
    // 1) Cheap sync check: ask the server only for the newest snapshot ts per
    //    kind. If our cached payload already matches, skip the heavy /data
    //    download and render straight from localStorage.
    const cached = readCache();
    if (cached && cached.latest) {
      const sCtrl = new AbortController();
      const sTo = setTimeout(() => sCtrl.abort(), 8000);
      try {
        const sres = await fetch("/api/vgen-trending/status", { cache: "no-store", signal: sCtrl.signal });
        clearTimeout(sTo);
        if (sres.ok) {
          const status = await sres.json();
          if (status.trending === cached.latest.trending &&
              status.profiles === cached.latest.profiles) {
            clearTimeout(to);
            applyData(cached, "cached");
            pushLog("ok", "In sync with server \u2013 loaded from local cache");
            return;
          }
        }
      } catch { clearTimeout(sTo); /* status check failed - fall through to full fetch */ }
    }
    // 2) Out of sync (or no usable cache): pull the full light payload and cache it.
    const res = await fetch("/api/vgen-trending/data", { cache: "no-store", signal: ctrl.signal });
    clearTimeout(to);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    writeCache(data);
    applyData(data, "read");
  } catch (err) {
    clearTimeout(to);
    const msg = err && err.name === "AbortError"
      ? "Request timed out (no response in " + (FETCH_TIMEOUT_MS / 1000) + "s)"
      : (err && err.message) || "Unknown error";
    meta.textContent = "load failed";
    setStatus("err", "Load failed: " + msg);
    pushLog("err", "Load failed: " + msg);
    LAST_LEVEL = "err";
    document.getElementById("main").innerHTML =
      '<div class="empty">Could not load data: <b>' + esc(msg) + '</b><br><br>' +
      'The hourly collector may not have run yet, or the data API is unavailable. ' +
      'Wait a minute, then click Refresh.</div>';
  } finally {
    hideOverlay();
  }
}

const TABS = ["overview", "profiles", "trending", "cross"];
function render() {
  const main = document.getElementById("main");
  // The standalone "threshold" tab was folded into the per-post chart; coerce any
  // stale saved tab back to overview so the view never goes blank.
  if (!TABS.includes(TAB)) { TAB = "overview"; localStorage.setItem("vg_tab", TAB); syncNav(); }
  if (TAB === "overview") { main.innerHTML = viewOverview(); wireOverview(); }
  else if (TAB === "profiles") { main.innerHTML = viewProfiles(); wireProfiles(); }
  else if (TAB === "trending") { main.innerHTML = viewTrending(); wireTrending(); }
  else if (TAB === "cross") main.innerHTML = viewCross();
}

  const clr = document.getElementById("clearLog");

}

// Lazily fill the "Unique trending posts" card from the shared /churn fetch.
// Just updates the one cell (no full re-render); reuses CHURN_CACHE if the
// Trending tab already loaded it this data version.
async function loadUniqueTrending() {
  const cell = document.getElementById("uniqTrend");
  if (!cell) return;
  if (!(DATA.trendingSnapshots || []).length) { cell.textContent = "-"; return; }
  try {
    const json = await fetchChurn();
    const c = document.getElementById("uniqTrend"); // may have re-rendered meanwhile
    if (c) c.textContent = fmt(Number(json.uniquePosts) || 0);
  } catch (e) {
    const c = document.getElementById("uniqTrend");
    if (c) c.textContent = "?";
  }
}

function viewOverview() {
  const t = DATA.trending, p = DATA.profiles;
  if (!t.length && !p.length)
    return '<div class="empty">No data yet. The hourly collector will populate this automatically &mdash; check back after the next run, then click Refresh.</div>' +
      logSection();
  // Snapshot counts/span come from the full id lists shipped by /data
  // (DATA.trending/DATA.profiles only hold the latest / last-2 snapshots,
  // so counting their distinct snapshot_ts would always show ~2).
  const tSnaps = [...(DATA.trendingSnapshots || [])].sort();
  const pSnaps = [...(DATA.profileSnapshots || [])].sort();
  const pPosts = uniq(p.map(r => r.showcaseID)).length;
  const users = uniq(p.map(r => r.watch_label));
  const LT = latestTrending();
  const span = (s) => s.length < 2 ? "-" :
    Math.round((new Date(s[s.length-1]) - new Date(s[0])) / 36e5 * 10) / 10 + "h";
  const card = (k, v) => '<div class="card"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';
  return '<div class="cards">' +
    card("Trending snapshots", tSnaps.length) +
    card("Trending span", span(tSnaps)) +
    '<div class="card"><div class="k">Unique trending posts</div><div class="v" id="uniqTrend">' +
      (CHURN_CACHE ? fmt(CHURN_CACHE.uniquePosts) : "\u2026") + '</div></div>' +
    card("Trending floor (SI)", LT.floor != null ? fmtSi(LT.floor) : "-") +
    card("Trending list size", fmt(LT.count)) +
    card("Profile snapshots", pSnaps.length) +
    card("Tracked accounts", users.length) +
    card("Tracked posts", fmt(pPosts)) +
    '</div>' +
    '<div class="panel"><h2>searchIndex by trending rank (latest snapshot)</h2>' +
    (LT.floor != null
      ? '<div class="hint">searchIndex of the post sitting at each rank in the latest trending snapshot' +
        (LT.ts ? ' (' + new Date(LT.ts).toLocaleString() + ')' : '') +
        '. To rank within the top N, a post needs roughly the searchIndex shown for that row.</div>' +
        thresholdTable() +
        '<div class="hint">Live floor (lowest SI still on the list): <b>' + fmtSi(LT.floor) +
        '</b> across ' + fmt(LT.count) + ' posts. The Profiles table compares each tracked post against this floor.</div>'
      : '<div class="hint">No trending snapshot loaded yet.</div>') +
    '</div>' +
    '<div class="panel"><h2>Tracked accounts</h2>' +
    (users.length ? '<div>' + users.map(u => '<span class="pill flat" style="margin:3px">'+esc(u)+'</span>').join("") + '</div>'
                  : '<div class="hint">No profile data yet.</div>') +
    '</div>' +
    logSection();
}

// ---- Profiles ------------------------------------------------------------
function viewProfiles() {
  const p = DATA.profiles;

  if (!p.length)

    '<h2>Per-post trajectory</h2>' +
    '<div class="ctrl-row"><select id="selUser"></select><select id="selPost"></select>' +
    '<button id="justBtn" class="tgl" title="Auto-fit the views axis to this post&rsquo;s data">Justify</button>' +
    '<button id="cfgBtn" class="sq" title="Chart settings">&#9881;</button></div>' +
    '<div id="cfgPanel" class="cfg" style="display:none">' +
      '<div class="field"><label>Max column height - likes</label>' +
        '<input type="number" id="cfgMaxV" min="1" step="10"></div>' +
      '<div class="field"><label>Trending threshold (top N rank)</label>' +
        '<div class="thr-slider"><input type="range" id="cfgThr" min="0" max="7" step="1">' +
        '<div class="thr-ticks" id="thrTicks"></div></div></div>' +
      '<div class="hint">searchIndex axis is fixed 0&ndash;1. The threshold line now follows ' +

    '</div>' +
    '<div id="chart"></div>' +
    '</div>' +
    '<div class="panel"><h2>Latest values (all tracked posts)</h2>' +
    '<div class="hint">Delta = change in viewCount since the previous snapshot. Tags compare each post against the live trending floor: ' +
    '<span class="pill up">on trending</span> = currently in the trending feed; ' +
    '<span class="pill near">qualifies</span> = SI is at/above the floor; ' +
    '<span class="pill near">near</span> = within ~7% of the floor.</div>' +

// Tracked-account labels in WATCHLIST order, with any accounts that still have
// retained data but were removed from the watchlist appended at the end (sorted)
// so their history stays reachable in the chart. This ordering drives the chart's
// account dropdown, so reordering the watchlist reorders the dropdown too.
function watchOrderedLabels() {
  const ordered = (DATA.watchlist || []).map(w => w.label);
  const inWl = new Set(ordered);
  const extra = uniq(DATA.profiles.map(r => r.watch_label))
    .filter(l => l && !inWl.has(l))
    .sort();
  return [...ordered, ...extra];
}

// Pull the @handle out of a "Name @handle" label -> the vgen.co profile slug.
function parseHandle(label) {
  const m = /@([A-Za-z0-9_]+)/.exec(label || "");
  return m ? m[1] : null;
}

function postsByUser(label) {
  const rows = DATA.profiles.filter(r => r.watch_label === label);
  const ids = uniq(rows.map(r => r.showcaseID));
  return ids.map(id => {
    const rs = rows.filter(r => r.showcaseID === id).sort(byTs);
    return { id, title: rs[0].title || id, created: rs[0].created || null, series: rs };
  }).sort((a, b) => new Date(b.created || 0) - new Date(a.created || 0));
}

// Fetch one post's full time series on demand (memoized). /data ships only the
// last 2 profile snapshots, so the per-post chart pulls the whole history here.
async function fetchPostSeries(id) {
  if (POST_CACHE.has(id)) return POST_CACHE.get(id);
  const res = await fetch("/api/vgen-trending/post?id=" + encodeURIComponent(id),
    { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  const series = Array.isArray(json.series) ? json.series : [];
  POST_CACHE.set(id, series);
  return series;
}

function wireProfiles() {
  wireWatchlist();
  // Chart controls only exist when there is profile data to plot.
  const selU = document.getElementById("selUser");
  if (!selU) return;
  // Account order follows the watchlist (drag-to-reorder), not alphabetical.
  const users = watchOrderedLabels();
  const selP = document.getElementById("selPost");
  selU.innerHTML = users.map(u => '<option>'+esc(u)+'</option>').join("");
  // restore remembered account if it still exists
  if (SEL_USER && users.includes(SEL_USER)) selU.value = SEL_USER;
  SEL_USER = selU.value;
  const fillPosts = () => {
    const posts = postsByUser(selU.value);
    selP.innerHTML = posts.map(p => '<option value="'+p.id+'">'+esc(fmtDMY(p.created)+" | "+trim(p.title,50))+'</option>').join("");
    // restore remembered post if it still exists for this account
    if (SEL_POST && posts.some(p => p.id === SEL_POST)) selP.value = SEL_POST;
    SEL_POST = selP.value;
    saveSel();
    drawPost();
  };
  const drawPost = async () => {
    const posts = postsByUser(selU.value);
    const post = posts.find(p => p.id === selP.value) || posts[0];
    const chart = document.getElementById("chart");
    if (!post) { chart.innerHTML = '<div class="hint">No post.</div>'; return; }
    const id = post.id;
    chart.innerHTML = '<div class="hint">Loading series\u2026</div>';
    let series;
    try { series = await fetchPostSeries(id); }
    catch (e) { chart.innerHTML = '<div class="hint">Failed to load series: '+esc((e&&e.message)||e)+'</div>'; return; }
    // Guard: the user may have switched posts while this was loading.
    if (selP.value && selP.value !== id) return;
    chart.innerHTML = dualChart(series.length ? series : post.series);
    wireChart();
  };
  selU.onchange = () => { SEL_USER = selU.value; SEL_POST = null; saveSel(); fillPosts(); };
  selP.onchange = () => { SEL_POST = selP.value; saveSel(); drawPost(); };

  // settings panel + external justify toggle
  const justBtn = document.getElementById("justBtn");
  const cfgBtn = document.getElementById("cfgBtn");
  const cfgPanel = document.getElementById("cfgPanel");
  const cMaxV = document.getElementById("cfgMaxV");
  const cThr = document.getElementById("cfgThr");
  const thrTicks = document.getElementById("thrTicks");
  // thr snaps to one of the 8 stored cut nodes; the slider value is the node index.
  CFG.thr = snapNode(CFG.thr);
  saveCfg();
  cMaxV.value = CFG.maxLikes;
  // Ticks are spaced evenly (one slot per node) regardless of the real rank gap -
  // a readability simulation, not a true 1:1 scale, as requested.
  const renderTicks = () => {
    thrTicks.innerHTML = THR_NODES
      .map(n => '<span class="' + (n === CFG.thr ? "on" : "") + '">' + n + '</span>')
      .join("");
  };
  cThr.value = String(THR_NODES.indexOf(CFG.thr));
  renderTicks();
  justBtn.classList.toggle("on", CFG.justify);
  justBtn.onclick = () => {
    CFG.justify = !CFG.justify;
    justBtn.classList.toggle("on", CFG.justify);
    saveCfg(); drawPost();
  };
  cfgBtn.onclick = () => {
    const open = cfgPanel.style.display === "none";
    cfgPanel.style.display = open ? "block" : "none";
    cfgBtn.classList.toggle("on", open);
  };
  // fields are never locked; they simply have no effect while Justify is on.
  cMaxV.oninput = () => {
    CFG.maxLikes = Math.max(1, Number(cMaxV.value) || CFG_DEFAULT.maxLikes);
    saveCfg(); drawPost();
  };
  // slider value is the node index (0..7); map it back to the rank node.
  const applyThr = () => {
    const i = Math.min(Math.max(0, Math.round(Number(cThr.value) || 0)), THR_NODES.length - 1);
    CFG.thr = THR_NODES[i];
    renderTicks();
    saveCfg(); drawPost();
  };
  cThr.oninput = applyThr;

  fillPosts();
  renderProfileTable();
}

function renderProfileTable() {
  const users = uniq(DATA.profiles.map(r => r.watch_label)).sort();
  const rows = [];
  for (const u of users) {
    for (const post of postsByUser(u)) {
      const s = post.series;
      const last = s.at(-1), prev = s.length > 1 ? s.at(-2) : null;
      const dv = prev ? (last.viewCount||0) - (prev.viewCount||0) : null;
      rows.push({ u, title: post.title, created: post.created, last, dv });
    }
  }
  // Sort by post creation time, newest on top, so same-titled re-uploads are
  // ordered and the latest clone is immediately visible.
  rows.sort((a, b) => new Date(b.created || 0) - new Date(a.created || 0));
  const LT = latestTrending();
  const delta = (d) => d === null ? '<span class="pill flat">new</span>'
    : d > 0 ? '<span class="pill up">+'+fmt(d)+'</span>'
    : d < 0 ? '<span class="pill down">'+fmt(d)+'</span>'
    : '<span class="pill flat">0</span>';
  const siCell = (v, id) => {
    let tag = "";
    if (LT.set.has(id)) tag = ' <span class="pill up">on trending</span>';
    else if (LT.floor != null && (v||0) >= LT.floor) tag = ' <span class="pill near">qualifies</span>';
    else if (LT.floor != null && (v||0) >= LT.floor * 0.93) tag = ' <span class="pill near">near</span>';
    return fmtSi(v) + tag;
  };
  const body = rows.map(r =>
    '<tr><td>'+esc(r.u)+'</td><td class="title-cell" title="'+esc(r.last.title||"")+'">'+esc(fmtDMY(r.created)+" | "+trim(r.last.title||r.last.showcaseID,40))+'</td>' +
    '<td class="num">'+fmt(r.last.viewCount)+'</td><td class="num">'+delta(r.dv)+'</td>' +
    '<td class="num">'+fmt(r.last.likeCount)+'</td><td class="num">'+siCell(r.last.searchIndex, r.last.showcaseID)+'</td></tr>'
  ).join("");
  document.getElementById("tbl").innerHTML =
    '<table><thead><tr><th>Account</th><th>Post</th><th class="num">Views</th>' +
    '<th class="num">&Delta; views</th><th class="num">Likes</th><th class="num">searchIndex</th></tr></thead>' +
    '<tbody>'+body+'</tbody></table>';
}

// ---- Watchlist manager ---------------------------------------------------
// The watchlist (userID + label per account) lives in Redis and drives what the
// collector fetches each run. Edits go through the protected POST /watchlist
// (Bearer VGEN_ADMIN_SECRET); the secret is prompted once and kept in
// localStorage. Removing an account is non-destructive: its stored snapshots are
// left to age out via normal retention.
function watchlistPanel() {
  return '<div class="panel"><h2>Manage tracked accounts</h2>' +
    '<div class="hint">Add a VGen account to collect its portfolio each run. ' +
    'Removing an account stops future collection only \u2013 its stored history is kept ' +
    'and ages out after ~30 days. Drag the handle to reorder; this also sets the order ' +
    'of the chart\u2019s account dropdown.</div>' +
    '<div class="wl-add">' +
      '<input id="wlName" type="text" placeholder="Name @handle (e.g. 88 Studio @EightyEightDesign)" />' +
      '<input id="wlUid" type="text" placeholder="User ID (UUID)" />' +
      '<button id="wlAdd">Add</button>' +
    '</div>' +
    '<div id="wlTbl"></div></div>';
}

function getAdminSecret() {
  let s = localStorage.getItem("vg_admin_secret");
  if (!s) {
    s = prompt("Enter the admin secret (VGEN_ADMIN_SECRET) to edit the watchlist:");
    if (s) localStorage.setItem("vg_admin_secret", s.trim());
  }
  return s ? s.trim() : null;
}

// Replace the whole watchlist on the server, then sync DATA + cache + UI. add /
// remove / reorder all funnel through here (each just passes a new ordered list).
async function saveWatchlist(list) {
  const secret = getAdminSecret();
  if (!secret) return false;
  try {
    const res = await fetch("/api/vgen-trending/watchlist", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + secret },
      body: JSON.stringify({ watchlist: list }),
    });
    if (res.status === 401) {
      localStorage.removeItem("vg_admin_secret");
      alert("Wrong admin secret \u2013 cleared. Try the action again to re-enter it.");
      return false;
    }
    const json = await res.json().catch(() => ({}));
    if (!res.ok || !json.ok) {
      alert("Failed to save watchlist: " + ((json && json.error) || ("HTTP " + res.status)));
      return false;
    }
    DATA.watchlist = json.watchlist;
    writeCache(DATA); // keep local cache consistent so a later in-sync load shows the edit
    pushLog("ok", "Watchlist updated (" + json.watchlist.length + " accounts)");
    render();
    return true;
  } catch (e) {
    alert("Failed to save watchlist: " + ((e && e.message) || e));
    return false;
  }
}

function reorderWatchlist(dragUid, targetUid, after) {
  const list = [...(DATA.watchlist || [])];
  const from = list.findIndex(w => w.userID === dragUid);
  if (from < 0) return;
  const [moved] = list.splice(from, 1);
  let to = list.findIndex(w => w.userID === targetUid);
  if (to < 0) return;
  if (after) to += 1;
  list.splice(to, 0, moved);
  saveWatchlist(list);
}

function closeRowMenu() {
  const m = document.getElementById("wlMenu");
  if (m) m.remove();
  document.removeEventListener("click", closeRowMenu);
}

function openRowMenu(btn, uid) {
  closeRowMenu();
  const entry = (DATA.watchlist || []).find(w => w.userID === uid);
  const handle = entry ? parseHandle(entry.label) : null;
  const menu = document.createElement("div");
  menu.className = "wl-menu";
  menu.id = "wlMenu";
  menu.innerHTML =
    '<button data-act="view">View profile' + (handle ? "" : " (no @handle)") + '</button>' +
    '<button class="danger" data-act="remove">Remove from tracker</button>';
  document.body.appendChild(menu);
  const r = btn.getBoundingClientRect();
  let left = r.right + window.scrollX - menu.offsetWidth;
  if (left < 8) left = 8;
  menu.style.left = left + "px";
  menu.style.top = (r.bottom + window.scrollY + 4) + "px";
  menu.addEventListener("click", (e) => {
    const act = e.target && e.target.getAttribute && e.target.getAttribute("data-act");
    if (!act) return;
    e.stopPropagation();
    closeRowMenu();
    if (act === "view") {
      if (handle) window.open("https://vgen.co/" + encodeURIComponent(handle), "_blank", "noopener");
      else alert("This account's label has no @handle, so its profile URL is unknown.");
    } else if (act === "remove") {
      if (confirm("Remove \"" + (entry ? entry.label : uid) + "\" from the tracker?\n\n" +
          "Its collected history is KEPT and ages out after ~30 days.")) {
        saveWatchlist((DATA.watchlist || []).filter(w => w.userID !== uid));
      }
    }
  });
  setTimeout(() => document.addEventListener("click", closeRowMenu), 0);
}

function renderWatchlistTable() {
  const host = document.getElementById("wlTbl");
  if (!host) return;
  const wl = DATA.watchlist || [];
  if (!wl.length) {
    host.innerHTML = '<div class="hint">No tracked accounts yet. Add one above.</div>';
    return;
  }
  const body = wl.map(w =>
    '<tr data-uid="'+esc(w.userID)+'">' +
      '<td class="wl-handle" title="Drag to reorder">\u2261</td>' +
      '<td>'+esc(w.label)+'</td>' +
      '<td class="wl-uid">'+esc(w.userID)+'</td>' +
      '<td style="text-align:right"><button class="wl-dot" title="Actions">\u22EE</button></td>' +
    '</tr>'
  ).join("");
  host.innerHTML =
    '<table class="wl"><thead><tr><th style="width:22px"></th><th>Name</th>' +
    '<th>User ID</th><th style="width:40px"></th></tr></thead><tbody>'+body+'</tbody></table>';

  const trs = host.querySelectorAll("tr[data-uid]");
  let dragUid = null;
  const clearMarks = () => trs.forEach(x => x.classList.remove("drop-above", "drop-below"));
  trs.forEach(tr => {
    // Drag is initiated only from the handle (rows are not draggable otherwise).
    const handle = tr.querySelector(".wl-handle");
    handle.addEventListener("mousedown", () => { tr.draggable = true; });
    tr.addEventListener("dragstart", (e) => {
      dragUid = tr.dataset.uid;
      tr.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      try { e.dataTransfer.setData("text/plain", dragUid); } catch (_) { /* Firefox */ }
    });
    tr.addEventListener("dragend", () => {
      tr.draggable = false;
      tr.classList.remove("dragging");
      clearMarks();
    });
    tr.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (!dragUid || tr.dataset.uid === dragUid) return;
      const rect = tr.getBoundingClientRect();
      const after = (e.clientY - rect.top) > rect.height / 2;
      clearMarks();
      tr.classList.add(after ? "drop-below" : "drop-above");
    });
    tr.addEventListener("drop", (e) => {
      e.preventDefault();
      const targetUid = tr.dataset.uid;
      if (!dragUid || dragUid === targetUid) { clearMarks(); return; }
      const rect = tr.getBoundingClientRect();
      const after = (e.clientY - rect.top) > rect.height / 2;
      clearMarks();
      reorderWatchlist(dragUid, targetUid, after);
    });
    tr.querySelector(".wl-dot").addEventListener("click", (e) => {
      e.stopPropagation();
      openRowMenu(e.currentTarget, tr.dataset.uid);
    });
  });
}

function wireWatchlist() {
  renderWatchlistTable();
  const addBtn = document.getElementById("wlAdd");
  if (!addBtn) return;
  const doAdd = () => {
    const name = (document.getElementById("wlName").value || "").trim();
    const uid = (document.getElementById("wlUid").value || "").trim();
    if (!name || !uid) { alert("Enter both a name and a user ID."); return; }
    if ((DATA.watchlist || []).some(w => w.userID === uid)) {
      alert("That user ID is already tracked."); return;
    }
    saveWatchlist([...(DATA.watchlist || []), { userID: uid, label: name }]);
  };
  addBtn.onclick = doAdd;
  const onEnter = (e) => { if (e.key === "Enter") doAdd(); };
  document.getElementById("wlName").addEventListener("keydown", onEnter);
  document.getElementById("wlUid").addEventListener("keydown", onEnter);
}

// ---- Trending ------------------------------------------------------------
function viewTrending() {
  const t = DATA.trending;
  if (!t.length)
    return '<div class="empty">No trending data yet. Waiting for the first collection run.</div>';
  return '<div class="panel"><h2>Snapshot</h2><div><select id="selSnap"></select></div>' +
    '<div class="hint" id="snapInfo"></div></div>' +
    '<div class="panel"><h2>Top posts</h2><div class="scroll" id="ttbl"></div></div>' +
    '<div class="panel"><h2>Churn between consecutive snapshots</h2><div class="scroll" id="churn"></div></div>';
}

// Fetch one trending snapshot's rows on demand (memoized). Only the latest is
// shipped in /data; older ones are pulled here when the user picks them.
async function fetchSnapshot(ts) {
  if (SNAP_CACHE.has(ts)) return SNAP_CACHE.get(ts);
  const res = await fetch("/api/vgen-trending/snapshot?kind=trending&ts=" + encodeURIComponent(ts),
    { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  const rows = Array.isArray(json.rows) ? json.rows : [];
  SNAP_CACHE.set(ts, rows);
  return rows;
}

function wireTrending() {
  // Newest first so the latest snapshot sits at the top of the dropdown
  // (easier to reach than scrolling to the bottom).
  const snaps = [...(DATA.trendingSnapshots || [])].sort().reverse();
  const sel = document.getElementById("selSnap");
  sel.innerHTML = snaps.map(s => '<option value="'+s+'">'+new Date(s).toLocaleString()+'</option>').join("");
  sel.value = snaps[0];
  const draw = async () => {
    const ts = sel.value;
    const ttbl = document.getElementById("ttbl");
    let rows = SNAP_CACHE.get(ts);
    if (!rows) {
      ttbl.innerHTML = '<div class="hint">Loading snapshot\u2026</div>';
      try { rows = await fetchSnapshot(ts); }
      catch (e) { ttbl.innerHTML = '<div class="hint">Failed to load snapshot: '+esc((e&&e.message)||e)+'</div>'; return; }
      if (sel.value !== ts) return; // user switched again while loading
    }
    rows = [...rows].sort((a,b)=>a.rank-b.rank);
    const floor = rows.length ? rows.at(-1).searchIndex : null;
    document.getElementById("snapInfo").textContent =
      rows.length + " posts  |  searchIndex floor: " + fmtSi(floor);
    const body = rows.map(r =>
      '<tr><td class="num">'+(r.rank+1)+'</td><td class="title-cell" title="'+esc(r.title||"")+'">'+esc(trim(r.title||"",48))+'</td>' +
      '<td>'+esc(r.displayName||r.username||"")+'</td><td class="num">'+fmt(r.viewCount)+'</td>' +
      '<td class="num">'+fmt(r.likeCount)+'</td><td class="num">'+fmtSi(r.searchIndex)+'</td>' +
      '<td>'+(r.isBoosted?'<span class="pill near">boost</span>':'')+'</td></tr>'
    ).join("");
    ttbl.innerHTML =
      '<table><thead><tr><th class="num">#</th><th>Title</th><th>Author</th>' +
      '<th class="num">Views</th><th class="num">Likes</th><th class="num">searchIndex</th><th></th></tr></thead>' +
      '<tbody>'+body+'</tbody></table>' +
      '<div class="hint">showing all '+rows.length+' posts</div>';
  };
  sel.onchange = draw;
  draw();
  loadChurn();
}

// Churn is computed server-side (over the full snapshot history) and only the
// small summary is returned, so the browser never pulls every snapshot for it.
async function loadChurn() {
  const el = document.getElementById("churn");
  if (!el) return;
  const snaps = DATA.trendingSnapshots || [];
  if (snaps.length < 2) {
    el.innerHTML = '<div class="hint">Need at least 2 snapshots to compute churn.</div>';
    return;
  }
  el.innerHTML = '<div class="hint">Computing churn\u2026</div>';
  let rows;
  try {
    const json = await fetchChurn();
    rows = Array.isArray(json.churn) ? json.churn : [];
  } catch (e) {
    el.innerHTML = '<div class="hint">Failed to compute churn: '+esc((e&&e.message)||e)+'</div>';
    return;
  }
  if (!rows.length) { el.innerHTML = '<div class="hint">No churn data yet.</div>'; return; }
  const body = rows.map(r =>
    '<tr><td>'+new Date(r.ts).toLocaleString()+'</td><td class="num">'+r.entries+'</td>' +
    '<td class="num">'+r.exits+'</td><td class="num">'+Number(r.jaccard).toFixed(3)+'</td></tr>'
  ).join("");
  el.innerHTML =
    '<div class="hint">Jaccard ~1.0 = list barely changed (supports "no continuous refresh"); lower = big reshuffle.</div>' +
    '<table><thead><tr><th>At snapshot</th><th class="num">Entered</th><th class="num">Exited</th><th class="num">Jaccard</th></tr></thead>' +
    '<tbody>'+body+'</tbody></table>';
}

// ---- Cross-reference -----------------------------------------------------
function viewCross() {
  const tIds = new Set(DATA.trending.map(r => r.showcaseID));
  const pRows = DATA.profiles.filter(r => tIds.has(r.showcaseID));
  if (!pRows.length)
    return '<div class="empty">No tracked post has appeared in trending yet (or one of the two feeds is empty).<br>' +
      'This panel confirms profile.searchIndex == trending.searchIndex once a post shows in both.</div>';
  const ids = uniq(pRows.map(r => r.showcaseID));
  const rows = ids.map(id => {
    const pr = DATA.profiles.filter(r => r.showcaseID === id).sort(byTs).at(-1);
    const tr = DATA.trending.filter(r => r.showcaseID === id).sort(byTs).at(-1);
    return { pr, tr, match: Math.abs((pr.searchIndex||0)-(tr.searchIndex||0)) < 1e-9 };
  });
  rows.sort((a, b) => (a.tr.rank ?? 1e9) - (b.tr.rank ?? 1e9));
  const body = rows.map(r =>
    '<tr><td class="num">#'+((r.tr.rank ?? 0) + 1)+'</td>' +
    '<td>'+esc(r.pr.watch_label||"")+'</td><td class="title-cell" title="'+esc(r.tr.title||"")+'">'+esc(trim(r.tr.title||"",40))+'</td>' +
    '<td class="num">'+fmtSi(r.pr.searchIndex)+'</td><td class="num">'+fmtSi(r.tr.searchIndex)+'</td>' +
    '<td>'+(r.match?'<span class="pill up">match</span>':'<span class="pill down">differ</span>')+'</td></tr>'
  ).join("");
  return '<div class="panel"><h2>Posts seen in BOTH feeds</h2>' +
    '<div class="hint">Validates the core hypothesis that the two feeds share one global searchIndex. Trending # is the rank of the post in its latest trending snapshot.</div>' +
    '<table><thead><tr><th class="num">Trending #</th><th>Account</th><th>Post</th><th class="num">profile SI</th><th class="num">trending SI</th><th>?</th></tr></thead>' +
    '<tbody>'+body+'</tbody></table></div>';
}

// ---- mini SVG dual-axis line chart ---------------------------------------
function dualChart(series) {
  if (series.length < 2)
    return '<div class="hint">Only one snapshot for this post so far - need 2+ to draw a line.</div>';
  const W = 940, H = 300, padL = 48, padR = 122, padT = 26, padB = 34;
  const xs = series.map(r => new Date(r.snapshot_ts).getTime());
  const likes = series.map(r => r.likeCount || 0);
  const sis = series.map(r => r.searchIndex || 0);
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const lmax = Math.max(...likes), lmin = Math.min(...likes);
  const smax = Math.max(...sis), smin = Math.min(...sis);
  const sx = (x) => padL + (xmax===xmin?0.5:(x-xmin)/(xmax-xmin)) * (W-padL-padR);
  const plotH = H - padT - padB;
  const clamp01 = (f) => f < 0 ? 0 : f > 1 ? 1 : f;
  // searchIndex axis is ALWAYS fixed 0..1 so posts and the threshold line share one
  // absolute scale. Justify auto-fits ONLY the likes axis; otherwise likes is fixed
  // to 0..maxLikes (0 at the baseline, the configured max at the top).
  const syS = (s) => H-padB - clamp01(s) * plotH;
  const syL = CFG.justify
    ? (v) => H-padB - (lmax===lmin?0.60:(v-lmin)/(lmax-lmin)) * plotH
    : (v) => H-padB - clamp01(v / (CFG.maxLikes || 1)) * plotH;
  const pts = series.map((r,i) => ({
    px: sx(xs[i]), t: r.snapshot_ts, like: likes[i], si: sis[i],
    yl: syL(likes[i]), ys: syS(sis[i]),
  }));
  CHART = { pts, W, padT };
  const path = (key) => pts.map((p,i)=>(i?"L":"M")+p.px.toFixed(1)+" "+p[key].toFixed(1)).join(" ");
  const last = pts[pts.length-1];
  const tFmt = (t) => new Date(t).toLocaleString([], {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
  // keep the two end labels from overlapping when the lines end close together
  let lvY = last.yl, lsY = last.ys;
  if (Math.abs(lvY - lsY) < 12) { const m = (lvY + lsY) / 2; lvY = m - 7; lsY = m + 7; }
  // Trending threshold line. CFG.thr is one of the stored cut nodes; its searchIndex
  // drifts over time, so we draw the cut's SI series (from DATA.threshold) clipped to
  // this post's time window instead of a single flat line. Falls back to a flat line
  // at the latest snapshot's cut SI when there are <2 threshold points in the window.
  const thrKey = String(CFG.thr);
  const thrPts = (DATA.threshold || [])
    .map(r => ({ t: new Date(r.ts).getTime(), si: r.cuts ? r.cuts[thrKey] : null }))
    .filter(p => typeof p.si === "number" && p.t >= xmin && p.t <= xmax)
    .sort((a, b) => a.t - b.t);
  const thrFallbackSi = rankToSi(CFG.thr);
  const thrLegendSi = thrPts.length ? thrPts.at(-1).si : thrFallbackSi;
  const thrLabel = "top " + CFG.thr + " \u2248 " + fmtSi(thrLegendSi);
  let thrLine = "";
  if (thrPts.length >= 2) {
    const d = thrPts
      .map((p, i) => (i ? "L" : "M") + sx(p.t).toFixed(1) + " " + syS(clamp01(p.si)).toFixed(1))
      .join(" ");
    const yEnd = syS(clamp01(thrPts.at(-1).si));
    thrLine =
      '<path d="'+d+'" fill="none" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.7"/>' +
      '<text x="'+(W-padR)+'" y="'+(yEnd-5).toFixed(1)+'" text-anchor="end" fill="var(--warn)">'+thrLabel+'</text>';
  } else if (thrFallbackSi != null && thrFallbackSi > 0) {
    const yThr = syS(clamp01(thrFallbackSi));
    thrLine =
      '<line x1="'+padL+'" y1="'+yThr.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yThr.toFixed(1)+'" ' +
      'stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.55"/>' +
      '<text x="'+(W-padR)+'" y="'+(yThr-5).toFixed(1)+'" text-anchor="end" fill="var(--warn)">'+thrLabel+'</text>';
  }
  const scaleNote = "likes " + (CFG.justify ? "auto-fit" : "0\u2013"+fmt(CFG.maxLikes)) + " \u00b7 SI 0\u20131";
  return '<div class="legend"><span class="views">likeCount ('+fmt(lmin)+'-'+fmt(lmax)+')</span>' +
    '<span class="si">searchIndex ('+fmtSi(smin)+'-'+fmtSi(smax)+')</span>' +
    (thrLegendSi != null ? '<span class="thr">trending '+thrLabel+'</span>' : '') +
    '<span style="margin-left:auto">scale: '+scaleNote+'</span></div>' +
    '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">' +
    '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="var(--line)"/>' +
    thrLine +
    '<path d="'+path("yl")+'" fill="none" stroke="var(--accent)" stroke-width="2"/>' +
    '<path d="'+path("ys")+'" fill="none" stroke="var(--accent-2)" stroke-width="2"/>' +
    '<text x="'+(last.px+8).toFixed(1)+'" y="'+(lvY+4).toFixed(1)+'" fill="var(--accent)">likes</text>' +
    '<text x="'+(last.px+8).toFixed(1)+'" y="'+(lsY+4).toFixed(1)+'" fill="var(--accent-2)">searchIndex</text>' +
    '<text x="'+padL+'" y="'+(H-12)+'" text-anchor="start">'+tFmt(pts[0].t)+'</text>' +
    '<text x="'+(W-padR)+'" y="'+(H-12)+'" text-anchor="end">'+tFmt(last.t)+'</text>' +
    '<line id="hoverLine" y1="'+padT+'" y2="'+(H-padB)+'" stroke="var(--muted)" stroke-dasharray="3 3" style="display:none"/>' +
    '<circle id="hoverDotV" r="4" fill="var(--accent)" style="display:none"/>' +
    '<circle id="hoverDotS" r="4" fill="var(--accent-2)" style="display:none"/>' +
    '<g id="hoverTip" style="display:none">' +
      '<rect id="hoverTipBg" width="190" height="60" rx="8" fill="var(--surface-2)" stroke="var(--line)"/>' +
      '<text id="hoverTipTime" x="11" y="21" fill="var(--text)"></text>' +
      '<text id="hoverTipViews" x="11" y="39" fill="var(--accent)"></text>' +
      '<text id="hoverTipSi" x="11" y="55" fill="var(--accent-2)"></text>' +
    '</g>' +
    '<rect id="hoverArea" x="'+padL+'" y="'+padT+'" width="'+(W-padL-padR)+'" height="'+(H-padT-padB)+'" fill="transparent" style="cursor:crosshair"/>' +
    '</svg>';
}

function wireChart() {
  const svg = document.querySelector("#chart svg");
  if (!svg) return;
  const $ = (id) => svg.querySelector("#" + id);
  const area = $("hoverArea"), vline = $("hoverLine");
  const dotV = $("hoverDotV"), dotS = $("hoverDotS");
  const tip = $("hoverTip"), tipT = $("hoverTipTime"), tipV = $("hoverTipViews"), tipS = $("hoverTipSi");
  const pts = CHART.pts;
  if (!area || !pts.length) return;
  const show = (on) => {
    const d = on ? "" : "none";
    for (const el of [vline, dotV, dotS, tip]) el.style.display = d;
  };
  const move = (e) => {
    const p = svg.createSVGPoint();
    p.x = e.clientX; p.y = e.clientY;
    const loc = p.matrixTransform(svg.getScreenCTM().inverse());
    let best = 0, bd = Infinity;
    for (let i = 0; i < pts.length; i++) {
      const d = Math.abs(pts[i].px - loc.x);
      if (d < bd) { bd = d; best = i; }
    }
    const pt = pts[best];
    vline.setAttribute("x1", pt.px); vline.setAttribute("x2", pt.px);
    dotV.setAttribute("cx", pt.px); dotV.setAttribute("cy", pt.yl);
    dotS.setAttribute("cx", pt.px); dotS.setAttribute("cy", pt.ys);
    tipT.textContent = new Date(pt.t).toLocaleString();
    tipV.textContent = "likes: " + Number(pt.like).toLocaleString();
    tipS.textContent = "searchIndex: " + Number(pt.si).toFixed(4);
    const tw = 190;
    let tx = pt.px + 12;
    if (tx + tw > CHART.W) tx = pt.px - 12 - tw;
    tip.setAttribute("transform", "translate(" + tx.toFixed(1) + "," + CHART.padT + ")");
    show(true);
  };
  area.addEventListener("mousemove", move);
  area.addEventListener("mouseleave", () => show(false));
}

// ---- helpers -------------------------------------------------------------
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function trim(s, n) { s = String(s); return s.length > n ? s.slice(0, n-1) + "\u2026" : s; }

document.querySelectorAll("nav a").forEach(a => a.onclick = () => {
  TAB = a.dataset.tab; localStorage.setItem("vg_tab", TAB);
  syncNav(); render();
});
document.getElementById("refresh").onclick = load;
// Export the FULL dataset (all snapshots + threshold series). The server streams
// it straight to a file download, reading Redis in <10MB batches, so neither the
// browser nor the server holds it all in memory - the browser only has the
// latest snapshot loaded, so we must NOT build this client-side.
document.getElementById("export").onclick = () => {
  // A plain navigation to the attachment endpoint lets the browser's download
  // manager save the streamed bytes to disk without loading them into JS.
  window.location.href = "/api/vgen-trending/export";
};
// Clicking the health dot jumps to Overview and opens the status log.
document.getElementById("statusDot").onclick = () => {
  TAB = "overview";
  localStorage.setItem("vg_tab", TAB);
  localStorage.setItem("vg_log_open", "1");
  syncNav();
  render();
};
// Idle health monitor: re-check snapshot age once a minute (no refetch) so an
// open tab still flips to yellow/red if the collector silently dies.
setInterval(() => {
  if (DATA.trending.length || DATA.profiles.length) evaluateHealth(false);
}, HEALTH_POLL_MS);
syncNav();
load();
</script>
